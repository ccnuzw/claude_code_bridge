<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0f2847"/>
      <stop offset="100%" stop-color="#1a4a7a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="20" y="20" width="984" height="984" rx="220" ry="220" fill="url(#bg)"/>
  
  <!-- Subtle border -->
  <rect x="20" y="20" width="984" height="984" rx="220" ry="220" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.3"/>
  
  <!-- Circuit pattern lines -->
  <g opacity="0.06" stroke="#3b82f6" stroke-width="1.5" fill="none">
    <line x1="200" y1="300" x2="400" y2="300"/>
    <line x1="400" y1="300" x2="400" y2="500"/>
    <line x1="600" y1="200" x2="600" y2="400"/>
    <line x1="600" y1="400" x2="800" y2="400"/>
    <line x1="300" y1="600" x2="300" y2="800"/>
    <line x1="300" y1="800" x2="500" y2="800"/>
    <line x1="700" y1="550" x2="700" y2="750"/>
    <line x1="700" y1="750" x2="850" y2="750"/>
    <circle cx="400" cy="300" r="4" fill="#3b82f6"/>
    <circle cx="600" cy="400" r="4" fill="#3b82f6"/>
    <circle cx="300" cy="800" r="4" fill="#3b82f6"/>
    <circle cx="700" cy="750" r="4" fill="#3b82f6"/>
  </g>
  
  <!-- Main "CC" text -->
  <text x="512" y="560" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif" 
        font-weight="800" font-size="340" fill="url(#accent)" filter="url(#glow)" letter-spacing="-15">
    CC
  </text>
  
  <!-- Bottom accent line -->
  <rect x="340" y="640" width="344" height="6" rx="3" fill="url(#accent)" opacity="0.6"/>
  
  <!-- Small "B" badge -->
  <circle cx="720" cy="340" r="60" fill="url(#accent)" opacity="0.9"/>
  <text x="720" y="358" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif"
        font-weight="700" font-size="64" fill="white">B</text>
</svg>