schema = "ccb-command-surface/v1"
mode = "deny_all_except"
enforcement = "required"
if_unsupported = "fail_mount"
generic_shell = false
generic_ccb = false
supported_providers = ["codex", "claude"]
allowed_effects = [
  "planner_silence_handoff",
]
forbidden_effects = [
  "task_create",
  "artifact_import",
  "status_write",
  "runner_start",
  "worker_dispatch",
  "project_artifact_write",
  "file_write",
  "shell_exec",
  "test_exec",
  "implementation",
  "generic_ccb",
  "wait",
  "watch",
  "arbitrary_target",
  "frontdesk_status_forward",
]

[provider_tools]
codex = "ccb_frontdesk_ask_planner"

[[allowed]]
id = "planner_silence_handoff"
argv_prefix = ["ask", "--silence", "--compact", "--inline-request", "--task-id"]
required_args = ["act-frontdesk-<request-id>", "planner"]
stdin_schema = "inline:ccb.frontdesk.intake.v1"
output_schema = "ccb.ask.submission_receipt.v1"
idempotency_key = "frontdesk_request_id_and_intake_sha256"
