schema = "ccb-command-surface/v1"
mode = "deny_all_except"
enforcement = "required"
if_unsupported = "fail_mount"
generic_shell = false
generic_ccb = false
supported_providers = ["codex", "claude"]
allowed_effects = [
  "observer_intake_handoff",
]
forbidden_effects = [
  "task_create",
  "artifact_import",
  "status_write",
  "runner_start",
  "worker_dispatch",
  "project_artifact_write",
  "file_write",
  "shell_exec",
  "test_exec",
  "implementation",
]
